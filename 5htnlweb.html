<!DOCTYPE html>
<html>
<head>
    <title>Static Webpage using HTML5 Tags</title>
    <style>
        nav{
            background-color: aqua;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
         header,footer{
            background-color: aqua;
            text-align: center;
         }
    </style>
</head>
<body>
    <header>
        <h1>My College Website</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <section>
        <h2>Welcome to Our College</h2>
        <p>This is a simple static webpage designed using HTML5 semantic tags.</p>
    </section>

    <article>
        <h3>News Update</h3>
        <p>Admissions are open for 2025 batch!</p>
    </article>

    <aside>
        <h4>Quick Links</h4>
        <ul>
            <li><a href="#">Courses</a></li>
            <li><a href="#">Results</a></li>
        </ul>
    </aside>

    <footer>
        <p>&copy; 2025 My College. All Rights Reserved.</p>
    </footer>
</body>
</html>
